<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="/styles/style.css" type="text/css">
	<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/timezone.js"></script>
	<script src="https://unpkg.com/micromodal/dist/micromodal.min.js"></script>
	<script type="module" src="/scripts/main.js"></script>
	<title>time-app</title>
</head>
<body>

	<div class="window">

		<div class="inner">

			<div class="city">

			<p id="city-label" class="city-label">Europe / London</p>

			<button data-micromodal-trigger="modal-1" class="edit-btn">
				<img class="edit-img" src="/images/pen.png">
			</button>
			
			</div>

			<h1 id="time" class="time">06:35:00</h1>

			<h5 id="date" class="date">Monday, 1 May, 2023</h5>

		</div>

	</div>
	
  <div class="modal" id="modal-1">

    <div class="modal__overlay" tabindex="-1" data-micromodal-close>

      <div class="modal__container" role="dialog" aria-modal="true" aria-labelledby="modal-1-title">

        <header class="modal__header">

          <h2 class="modal__title" id="modal-1-title">
            Change Timezone
          </h2>
          
        </header>

        <main class="modal__content" id="modal-1-content">

					<select id="timezone-select" name="cities">
							<option value="Asia/Tokyo">Asia/Tokyo</option>
							<option value="America/New_York">America/New_York</option>
							<option value="Europe/Moscow" selected>Europe/Moscow</option>
							<option value="Europe/London">Europe/London</option>
							<option value="Asia/Dubai">Asia/Dubai</option>
							<option value="Australia/Sydney">Australia/Sydney</option>
					</select>

        </main>

        <footer class="modal__footer">

          <button id="apply-btn" class="modal__btn modal__btn-primary">Apply</button>

          <button class="modal__btn" data-micromodal-close aria-label="Close this dialog window">Close</button>

        </footer>

      </div>

    </div>

  </div>

</body>
</html>
